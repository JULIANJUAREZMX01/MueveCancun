version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      dev-tooling:
        patterns: ["eslint*", "typescript*", "vitest*", "playwright*"]
      astro:
        patterns: ["astro*", "@astrojs/*"]

  - package-ecosystem: "cargo"
    directory: "/rust-wasm"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
