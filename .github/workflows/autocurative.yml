name: Auto-Curative (Self-Healing)

on:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: [main]
    paths: ["public/data/**"]
  workflow_dispatch:
    inputs:
      run_geocode:
        description: "Run geocoder"
        required: false
        default: "false"

jobs:
  autocurative:
    name: Self-Healing Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: "24"
      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47 # v4.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@54e2af0a8339c0435fa1de94002eab349a2f15ef # v2.7.3
        with:
          workspaces: rust-wasm
      - run: pnpm install --frozen-lockfile
      - run: node --experimental-strip-types scripts/merge-routes.ts
      - name: Geocode
        if: github.event.inputs.run_geocode == 'true'
        run: node --experimental-strip-types scripts/geocode-stops.ts --limit=50
      - run: node --experimental-strip-types scripts/validate-routes.ts
      - run: node --experimental-strip-types scripts/optimize-json.ts
      - working-directory: rust-wasm/route-calculator
        run: cargo test --lib
      - run: node scripts/check-wasm.cjs
      - run: node --experimental-strip-types scripts/build-wasm.ts
      - uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5.0.1
        with:
          commit_message: "chore(autocurative): self-heal [skip ci]"
          file_pattern: "public/data/* public/wasm/*"
