name: Auto-Curative (Self-Healing)

on:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: [main]
    paths: ["public/data/**"]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "Manual health check"
      run_geocoder:
        description: "Run geocoder for missing coordinates (true/false)"
        required: false
        default: "false"

jobs:
  audit:
    name: Auto-Curative Audit
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run route data validation
        run: node --experimental-strip-types scripts/validate-routes.ts
