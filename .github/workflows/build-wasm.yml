name: Build WASM Pipeline

on:
  push:
    branches: [main, develop]
    paths: ["rust-wasm/**"]
  pull_request:
    branches: [main]
    paths: ["rust-wasm/**"]

jobs:
  test-and-build:
    name: Rust Unit → WASM Pack → Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable # master
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2 # v2.7.3
        with:
          workspaces: rust-wasm
      - name: Install wasm-pack
        run: |
          npm install -g wasm-pack

      - name: Test Logic
        working-directory: rust-wasm/route-calculator
        run: cargo test --lib -- --nocapture

      - name: Build Modules
        run: |
          wasm-pack build rust-wasm/route-calculator --target web --out-dir ../../public/wasm/route-calculator
          wasm-pack build rust-wasm/spatial-index --target web --out-dir ../../public/wasm/spatial-index
          rm -f public/wasm/*/.gitignore

      - name: Verify Binary
        run: node scripts/check-wasm.cjs

      - name: Auto-Commit Artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5 # v5.1.0
        with:
          commit_message: "chore(wasm): refresh optimized binaries [skip ci]"
          file_pattern: "public/wasm/*"
