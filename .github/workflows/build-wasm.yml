name: Build WASM Pipeline

on:
  push:
    branches: [main, develop]
    paths: ["rust-wasm/**"]
  pull_request:
    branches: [main]
    paths: ["rust-wasm/**"]

jobs:
  test-and-build:
    name: Rust Unit → WASM Pack → Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@54e2af0a8339c0435fa1de94002eab349a2f15ef # v2.7.3
        with:
          workspaces: rust-wasm
      - name: Install wasm-pack
        run: |
          npm install -g wasm-pack

      - name: Test Logic
        working-directory: rust-wasm/route-calculator
        run: cargo test --lib -- --nocapture

      - name: Build Modules
        run: |
          wasm-pack build rust-wasm/route-calculator --target web --out-dir ../../public/wasm/route-calculator
          wasm-pack build rust-wasm/spatial-index --target web --out-dir ../../public/wasm/spatial-index
          rm -f public/wasm/*/.gitignore

      - name: Verify Binary
        run: node scripts/check-wasm.cjs

      - name: Auto-Commit Artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5.0.1
        with:
          commit_message: "chore(wasm): refresh optimized binaries [skip ci]"
          file_pattern: "public/wasm/*"
