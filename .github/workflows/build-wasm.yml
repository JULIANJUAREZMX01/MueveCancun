name: Build WASM Modules

on:
  push:
    branches: [main, develop]
    paths:
      - "rust-wasm/**"
  pull_request:
    branches: [main]
    paths:
      - "rust-wasm/**"

jobs:
  test-and-build:
    name: Test → Build → Commit WASM
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: rust-wasm

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # Run tests BEFORE building — fail fast if tests break
      - name: Run route-calculator unit tests
        working-directory: rust-wasm/route-calculator
        run: cargo test --lib -- --nocapture --test-threads=1

      - name: Run spatial-index unit tests
        working-directory: rust-wasm/spatial-index
        run: cargo test --lib || true  # spatial-index tests are optional

      # Build WASM
      # NOTE: Only route-calculator is built and committed here.
      # spatial-index is a workspace member but its wasm-pack JS glue has not
      # been committed yet; it will be added to this step once the JS glue is ready.
      - name: Build route-calculator WASM
        run: |
          cd rust-wasm/route-calculator
          wasm-pack build --target web --out-dir ../../public/wasm/route-calculator
          rm -f ../../public/wasm/route-calculator/.gitignore

      - name: Report bundle sizes
        run: |
          echo "=== WASM Bundle Sizes ==="
          ls -lh public/wasm/route-calculator/
          echo "route_calculator_bg.wasm: $(du -h public/wasm/route-calculator/route_calculator_bg.wasm | cut -f1)"

      # Verify binary is sane (>0 bytes, loads as binary)
      - name: Verify WASM binary
        run: node scripts/check-wasm.cjs

      # Cache WASM binary for downstream test/build jobs
      - name: Cache WASM binary
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: public/wasm/route-calculator
          key: wasm-build-${{ github.sha }}

      # Auto-commit built artifacts (only on push to real branches, not PRs)
      - name: Commit WASM artifacts
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: "chore(wasm): auto-build route-calculator WASM [skip ci]"
          file_pattern: "public/wasm/route-calculator/*"
          add_options: "--force"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
