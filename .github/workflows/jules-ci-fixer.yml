name: JULES - CI Stability Protocol

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  workflow_run:
    workflows: ["CI / Security & Quality"]
    types: [completed]
    conclusienv:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on: [failure]

jobs:
  fix:
    runs-env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    steps:
      # Checkout the default branch only — trusted code.
      # The untrusted head SHA is never checked out; its diff is fetched via API below.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node 24
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with:
          node-versienv:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on: "24"
      - run: echo "[NEXUS_LOG] Initiating autocurative triage for failed CI run ${{ github.event.workflow_run.id }}"
