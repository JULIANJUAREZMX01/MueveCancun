name: JULES - CI Stability Protocol

on:
  workflow_run:
    workflows: ["CI / Security & Quality"]
    types: [completed]
    conclusion: [failure]

jobs:
  fix:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    steps:
      # Checkout the default branch only — trusted code.
      # The untrusted head SHA is never checked out; its diff is fetched via API below.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node 24
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: "24"
      - run: echo "[NEXUS_LOG] Initiating autocurative triage for failed CI run ${{ github.event.workflow_run.id }}"
