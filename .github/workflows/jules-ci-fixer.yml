name: Jules CI Fixer

# Automatically delegates failing CI jobs to Jules for autonomous repair.
# Jules will analyze the failure logs, apply a fix, and open a PR.
#
# Requires secret: JULES_API_KEY

on:
  workflow_run:
    workflows:
      - "Tests"
      - "Build WASM Modules"
      - "Validate Route Data"
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  detect-failure:
    name: Detect CI Failure
    runs-on: ubuntu-latest
    # Only trigger when the upstream workflow failed and it's not a PR from a bot
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event != 'workflow_run' &&
      !contains(github.event.workflow_run.head_commit.message, '[skip ci]') &&
      !contains(github.event.workflow_run.head_commit.message, '[jules]')
    outputs:
      should_fix: ${{ steps.check.outputs.should_fix }}
      head_branch: ${{ steps.check.outputs.head_branch }}
      head_sha: ${{ steps.check.outputs.head_sha }}
      workflow_name: ${{ steps.check.outputs.workflow_name }}
      run_url: ${{ steps.check.outputs.run_url }}
    steps:
      - name: Check if branch is fixable
        id: check
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          echo "Branch: $BRANCH"
          echo "Conclusion: $CONCLUSION"

          # Only fix branches that are active development branches (not main directly)
          # but do fix main as well since autocurative runs there
          SHOULD_FIX="true"

          echo "should_fix=$SHOULD_FIX" >> "$GITHUB_OUTPUT"
          echo "head_branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "head_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          echo "workflow_name=${{ github.event.workflow_run.name }}" >> "$GITHUB_OUTPUT"
          echo "run_url=${{ github.event.workflow_run.html_url }}" >> "$GITHUB_OUTPUT"

  fetch-logs-and-fix:
    name: Fetch Failed Logs → Jules Fix
    runs-on: ubuntu-latest
    needs: detect-failure
    if: needs.detect-failure.outputs.should_fix == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch failed job logs
        id: fetch-logs
        uses: actions/github-script@v7
        with:
          script: |
            const runId = ${{ github.event.workflow_run.id }};
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });

            const failedJobs = jobs.data.jobs.filter(j => j.conclusion === 'failure');
            if (failedJobs.length === 0) {
              core.setOutput('failed_job_name', 'unknown');
              core.setOutput('failed_log', '(no failed steps found)');
              return;
            }

            const firstFailed = failedJobs[0];
            core.setOutput('failed_job_name', firstFailed.name);

            try {
              const logResponse = await github.rest.actions.downloadJobLogsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                job_id: firstFailed.id,
              });
              const log = String(logResponse.data || '').slice(0, 8192);
              core.setOutput('failed_log', log);
            } catch (_) {
              // Logs may require higher permissions; provide step-level info instead
              const stepSummary = firstFailed.steps
                .filter(s => s.conclusion === 'failure')
                .map(s => `Step "${s.name}" failed (exit code: ${s.conclusion})`)
                .join('\n');
              core.setOutput('failed_log', stepSummary || '(log unavailable)');
            }

      - name: Invoke Jules to fix CI failure
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          FAILED_JOB_NAME: ${{ steps.fetch-logs.outputs.failed_job_name }}
          FAILED_LOG: ${{ steps.fetch-logs.outputs.failed_log }}
          WORKFLOW_NAME: ${{ needs.detect-failure.outputs.workflow_name }}
          HEAD_BRANCH: ${{ needs.detect-failure.outputs.head_branch }}
          HEAD_SHA: ${{ needs.detect-failure.outputs.head_sha }}
          RUN_URL: ${{ needs.detect-failure.outputs.run_url }}
        run: node scripts/jules-ci-fix.mjs

      - name: Post status comment (on PR if applicable)
        if: github.event.workflow_run.event == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${{ needs.detect-failure.outputs.head_branch }}`,
              state: 'open',
            });
            if (prs.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prs.data[0].number,
                body: [
                  '🤖 **Jules CI Fixer** fue invocado automáticamente.',
                  '',
                  `> Workflow **${{ needs.detect-failure.outputs.workflow_name }}** falló en el job \`${{ steps.fetch-logs.outputs.failed_job_name }}\`.`,
                  '',
                  'Jules está analizando los logs y preparando un fix. Un PR con la corrección aparecerá próximamente.',
                  '',
                  `[Ver run fallido](${{ needs.detect-failure.outputs.run_url }})`,
                ].join('\n'),
              });
            }
