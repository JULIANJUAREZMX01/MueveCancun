name: JULES - CI Stability Protocol

on:
  workflow_run:
    workflows: ["CI / Security & Quality"]
    types: [completed]
    conclusion: [failure]

jobs:
  fix:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    steps:
      # Checkout the default branch only — trusted code.
      # The untrusted head SHA is never checked out; its diff is fetched via API below.
      - uses: actions/checkout@v4 # v4.1.7

      - name: Setup Node 24
        uses: actions/setup-node@v4 # v4.0.3
        with:
          node-version: "24"
      - run: echo "[NEXUS_LOG] Initiating autocurative triage for failed CI run ${{ github.event.workflow_run.id }}"
