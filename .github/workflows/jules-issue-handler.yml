name: Jules Issue Handler

# Se activa cuando se abre un issue (vía reports.ts) o cuando se añade el label "jules" manualmente.
on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write

jobs:
  handle-issue:
    name: Delegate Issue to Jules
    runs-on: ubuntu-latest
    # Se ejecuta si el label es 'jules' O si el cuerpo contiene la mención '@jules'
    if: |
      github.event.label.name == 'jules' || 
      contains(github.event.issue.body, '@jules')
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@39225597fd66c3c8bc5b94f11300945842835848
        with:
          node-version: "24"

      - name: Get Repository Info
        id: repo-info
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            const repo = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            core.setOutput('default_branch', repo.data.default_branch);

      - name: Create Dedicated Working Branch
        id: branching
        run: |
          # Extraer tipo desde labels (ej. type:fix -> fix) enviado por reports.ts
          LABEL_TYPE=$(echo '${{ toJson(github.event.issue.labels.*.name) }}' | grep -o 'type:[^ ]*' | cut -d: -f2 || echo "fix")
          BRANCH_NAME="${LABEL_TYPE}/jules-solve-${{ github.event.issue.number }}"
          
          git checkout -b $BRANCH_NAME
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@://github.com"
          
          # Commit inicial para establecer el contexto de la rama
          git commit --allow-empty -m "chore: jules workspace for issue #${{ github.event.issue.number }}"
          git push origin $BRANCH_NAME
          echo "working_branch=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Post Acknowledgement Comment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '🤖 **Jules Nexus Engine** ha tomado el control.',
                '',
                '**Entorno de trabajo:** `${{ steps.branching.outputs.working_branch }}`',
                '**Acción:** Analizando metadatos, verificando lógica de Rust/WASM y optimizando UI.',
                '',
                '_Modo: AUTOMATED_BRANCH_FLOW · Agente: Google Jules (Gemini)_',
              ].join('\n'),
            });

      - name: Invoke Jules for Issue Resolution
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ toJson(github.event.issue.labels.*.name) }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          DEFAULT_BRANCH: ${{ steps.repo-info.outputs.default_branch }}
          WORKING_BRANCH: ${{ steps.branching.outputs.working_branch }}
        # Aquí Jules recibe la rama específica para trabajar
        run: node scripts/jules-issue.mjs

      - name: Post Follow-up on Failure
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '⚠️ **Jules** falló al procesar el issue.',
                '',
                'Revisar logs de compilación WASM o permisos del token.',
                '',
                `[Ver detalles del error](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              ].join('\n'),
            });
