name: Jules PR Assistant

# Allows any PR contributor to invoke Jules from a PR comment by writing:
#   /jules <task description>
#
# Jules will read the PR context and the requested task, apply changes to
# the PR branch, and the PR will update automatically.
#
# Requires secret: JULES_API_KEY

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  handle-pr-comment:
    name: Jules PR Comment Handler
    runs-on: ubuntu-latest
    # Only trigger on PR comments (not issue comments) that start with /jules
    if: >
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/jules')
    steps:
      - name: Fetch PR details
        id: pr-details
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ github.event.issue.number }},
            });
            core.setOutput('head_branch', pr.data.head.ref);
            core.setOutput('base_branch', pr.data.base.ref);
            core.setOutput('title', pr.data.title);
            core.setOutput('body', (pr.data.body || '').slice(0, 4096));
            core.setOutput('url', pr.data.html_url);

      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: React to comment (acknowledge)
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ github.event.comment.id }},
              content: 'eyes',
            });

      - name: Invoke Jules PR assistant
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          PR_NUMBER: ${{ github.event.issue.number }}
          PR_TITLE: ${{ steps.pr-details.outputs.title }}
          PR_BODY: ${{ steps.pr-details.outputs.body }}
          PR_HEAD_BRANCH: ${{ steps.pr-details.outputs.head_branch }}
          PR_BASE_BRANCH: ${{ steps.pr-details.outputs.base_branch }}
          PR_URL: ${{ steps.pr-details.outputs.url }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        run: node scripts/jules-pr.mjs

      - name: Post success comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: [
                '🤖 **Jules** recibió la solicitud y comenzó a trabajar.',
                '',
                `> \`${{ github.event.comment.body }}\``,
                '',
                'Los cambios serán commiteados directamente en esta rama. El PR se actualizará automáticamente.',
                '',
                '_Agente: Google Jules (Gemini) · Modo: CO_AUTHORED_',
              ].join('\n'),
            });

      - name: React to comment (done)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ github.event.comment.id }},
              content: 'rocket',
            });

      - name: Post failure comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: [
                '⚠️ **Jules** no pudo procesar la solicitud.',
                '',
                'Verificar que el secreto `JULES_API_KEY` esté configurado correctamente.',
                '',
                `[Ver run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              ].join('\n'),
            });
