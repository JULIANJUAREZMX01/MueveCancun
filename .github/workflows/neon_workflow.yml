name: Neon Managed Infrastructure

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: read

jobs:
  manage-branch:
    name: Neon Ephemeral Environment
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v4 # v4

      - name: Calcular fecha de expiración (2 semanas)
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6 # v6.0.0
        with:
          project_id: mute-waterfall-29421911
          branch_name: preview/pr-${{ github.event.number }}-neon
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Setup Node 24
        uses: actions/setup-node@v4 # v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # v4

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Aplicar schema a branch Neon del PR
        run: |
          node --input-type=module << 'NODE_EOF'
            import { neon } from "@neondatabase/serverless";
            const sql = neon(process.env.DATABASE_URL);
            await sql`CREATE TABLE IF NOT EXISTS guardians (email TEXT, stripe_customer_id TEXT PRIMARY KEY, status TEXT DEFAULT 'active')`;
            console.log("Schema verified on ephemeral branch");
          NODE_EOF
        env:
          DATABASE_URL: ${{ steps.create_neon_branch.outputs.db_url }}

      - name: Comentar en PR con URL del branch Neon
        uses: actions/github-script@v7 # v7
        with:
          script: |
            const branch = "preview/pr-${{ github.event.number }}-neon";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.number }},
              body: [
                "## 🐘 Neon Branch creada para este PR",
                "",
                `**Branch:** \`${branch}\``,
                "**Expira en:** 14 días",
                "",
                "El schema de Guardians + Payments fue aplicado automáticamente.",
                "Vercel Preview usará esta DB aislada.",
                "",
                "> Generado automáticamente por neon_workflow.yml",
              ].join("\n"),
            });

  cleanup:
    name: Destroy Ephemeral Branch
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3 # v3.0.0
        with:
          project_id: mute-waterfall-29421911
          branch_name: preview/pr-${{ github.event.number }}-neon
          api_key: ${{ secrets.NEON_API_KEY }}
          branch: preview/pr-${{ github.event.number }}
