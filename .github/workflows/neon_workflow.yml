name: Neon Managed Infrastructure

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: read

jobs:
  manage-branch:
    name: Neon Ephemeral Environment
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - name: Create Isolated Branch
        id: neon-branch
        uses: neondatabase/create-branch-action@153375631fc0f99cf0113e0cef877850452e6ca2 # v6.0.0
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch_name: preview/pr-${{ github.event.number }}
      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: 24
      - run: npm install -g pnpm && pnpm install --frozen-lockfile
      - name: Apply DB Schema
        run: |
          node --input-type=module << 'NODE_EOF'
            import { neon } from "@neondatabase/serverless";
            const sql = neon(process.env.DATABASE_URL);
            await sql`CREATE TABLE IF NOT EXISTS guardians (email TEXT, stripe_customer_id TEXT PRIMARY KEY, status TEXT DEFAULT 'active')`;
            console.log("Schema verified on ephemeral branch");
          NODE_EOF
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url }}

  cleanup:
    name: Destroy Ephemeral Branch
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    steps:
      - uses: neondatabase/delete-branch-action@f76e64adf2bfc40935a6027026d24ac78a3072e6 # v3.0.0
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch: preview/pr-${{ github.event.number }}
