name: Neon Branch Preview — Create/Delete on PR

# Crea una rama Neon aislada para cada PR
# La rama tiene los mismos datos que producción pero está aislada
# Se elimina automáticamente cuando el PR se cierra

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  setup:
    name: "Setup — obtener nombre de branch"
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@dde14ac574a8b9b1cedc59a1cf312788af43d8d8 # v8

  create_neon_branch:
    name: "Crear branch Neon para PR #${{ github.event.number }}"
    outputs:
      db_url: ${{ steps.create_branch.outputs.db_url }}
      db_url_pooled: ${{ steps.create_branch.outputs.db_url_with_pooler }}
    needs: setup
    if: |
      github.event_name == 'pull_request' && (
        github.event.action == 'synchronize' ||
        github.event_name == 'pull_request' && github.event.action == 'opened' ||
        github.event_name == 'pull_request' && github.event.action == 'reopened'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Calcular fecha de expiración (2 semanas)
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Crear Neon Branch
        id: create_branch
        uses: neondatabase/create-branch-action@fb620d43d4c565abaf088b848a4e28e5c4ea4d9c # v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - name: Setup Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Aplicar schema a branch Neon del PR
        run: |
          node --input-type=module << 'NODE_EOF'
          import { neon } from "@neondatabase/serverless";
          const sql = neon(process.env.DATABASE_URL);
          try {
            await sql`
              CREATE TABLE IF NOT EXISTS guardians (
                email               TEXT,
                stripe_customer_id  TEXT PRIMARY KEY,
                tier                TEXT,
                amount_monthly      NUMERIC,
                status              TEXT NOT NULL DEFAULT 'active',
                created_at          TIMESTAMPTZ DEFAULT NOW(),
                updated_at          TIMESTAMPTZ DEFAULT NOW()
              )
            `;
            await sql`
              CREATE TABLE IF NOT EXISTS payments (
                id                  TEXT PRIMARY KEY DEFAULT gen_random_uuid()::text,
                stripe_customer_id  TEXT NOT NULL,
                amount              NUMERIC,
                status              TEXT NOT NULL DEFAULT 'pending',
                stripe_payment_id   TEXT,
                created_at          TIMESTAMPTZ DEFAULT NOW()
              )
            `;
            console.log("✅ Schema aplicado al branch Neon del PR");
          } catch (e) {
            console.error("❌ Fallo al aplicar schema:", e);
            process.exit(1);
          }
          NODE_EOF
        env:
          DATABASE_URL: ${{ steps.create_branch.outputs.db_url_with_pooler }}

      - name: Comentar en PR con URL del branch Neon
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const branch = "preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.number }},
              body: [
                "## 🐘 Neon Branch creada para este PR",
                "",
                `**Branch:** \`${branch}\``,
                "**Expira en:** 14 días",
                "",
                "El schema de Guardians + Payments fue aplicado automáticamente.",
                "Vercel Preview usará esta DB aislada.",
                "",
                "> Generado automáticamente por neon_workflow.yml",
              ].join("\n"),
            });

  delete_neon_branch:
    name: "Eliminar branch Neon — PR #${{ github.event.number }} cerrado"
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Eliminar Neon Branch
        uses: neondatabase/delete-branch-action@4468d825d5a88ef4012f1705a82f02ec3072f776 # v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
