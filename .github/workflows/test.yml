name: Tests

permissions:
  contents: read

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-tests:
    name: Rust WASM Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@87d00f7e447df178b022203ed48e42657e29780c
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@823b5ca084baad149bc27f54c9c1b979207e4c27
        with:
          workspaces: rust-wasm

      - name: Run route-calculator tests
        working-directory: rust-wasm/route-calculator
        run: cargo test --lib -- --nocapture --test-threads=1

  ts-tests:
    name: TypeScript Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node 22
        uses: actions/setup-node@1d429da20474c46469af3ad516f8d16717f863b7
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@a34848ad9613149a460456102ce69e5d41f5a91a

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest
        run: pnpm test -- --reporter=verbose

  validate-routes:
    name: Validate Route Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node 22
        uses: actions/setup-node@1d429da20474c46469af3ad516f8d16717f863b7
        with:
          node-version: "22"

      - name: Validate master_routes.json
        run: node --experimental-strip-types scripts/validate-routes.ts

  build-check:
    name: Build Check (Astro SSG)
    runs-on: ubuntu-latest
    needs: [ts-tests, validate-routes, rust-tests]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node 22
        uses: actions/setup-node@1d429da20474c46469af3ad516f8d16717f863b7
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@a34848ad9613149a460456102ce69e5d41f5a91a

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore WASM cache
        id: cache-wasm
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf
        with:
          path: public/wasm/route-calculator
          key: wasm-build-${{ runner.os }}-${{ hashFiles('rust-wasm/**/*', 'Cargo.lock') }}
          restore-keys: |
            wasm-build-${{ runner.os }}-

      - name: Build WASM fallback (if cache miss)
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        run: |
          npm install -g wasm-pack
          cd rust-wasm/route-calculator
          wasm-pack build --target web --out-dir ../../public/wasm/route-calculator

      - name: Check WASM binary exists
        run: node scripts/check-wasm.cjs

      - name: Optimize JSON
        run: node --experimental-strip-types scripts/optimize-json.ts || true

      - name: Astro build
        run: pnpm exec astro build
        env:
          NODE_ENV: production
