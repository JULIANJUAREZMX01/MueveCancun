name: CI / Security & Quality

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  environment:
    name: Environment Setup
    runs-on: ubuntu-latest
    outputs:
      pnpm_cache: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@feaa28b65f02c657a4109ba44799fe30bca29ffc # v4.0.0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # master
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - uses: actions/setup-node@39225597fd66c3c8bc5b94f11300945842835848 # v4.1.0
        with:
          node-version: 24
          cache: 'pnpm'
      - id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

  lint:
    name: Lint & Prettier
    needs: environment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@feaa28b65f02c657a4109ba44799fe30bca29ffc # v4.0.0
      - name: Setup Node 24
        uses: actions/setup-node@39225597fd66c3c8bc5b94f11300945842835848 # v4.1.0
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  ts-unit:
    name: TS Unit Tests
    needs: environment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@feaa28b65f02c657a4109ba44799fe30bca29ffc # v4.0.0
      - uses: actions/setup-node@39225597fd66c3c8bc5b94f11300945842835848 # v4.1.0
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test -- --reporter=verbose

  rust-unit:
    name: Rust WASM Logic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # master
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@8230533580547021e102280d859f77f985055620 # v2.7.3
        with:
          workspaces: rust-wasm
      - name: Run route-calculator tests
        working-directory: rust-wasm/route-calculator
        run: cargo test --lib -- --nocapture

  data-integrity:
    name: Data Validation
    needs: environment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Node 24
        uses: actions/setup-node@39225597fd66c3c8bc5b94f11300945842835848 # v4.1.0
        with:
          node-version: 24
      - run: node --experimental-strip-types scripts/validate-routes.ts

  build-vercel:
    name: Production Build (Vercel)
    needs: [ts-unit, rust-unit, data-integrity]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@feaa28b65f02c657a4109ba44799fe30bca29ffc # v4.0.0
      - uses: actions/setup-node@39225597fd66c3c8bc5b94f11300945842835848 # v4.1.0
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build WASM
        run: node scripts/build-wasm.mjs
      - name: Astro build
        run: pnpm build:vercel
        env:
          NODE_ENV: production
