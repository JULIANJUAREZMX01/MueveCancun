name: CI/CD Pipeline

permissions:
  contents: read

on:
  push:
    branches: [main, "claude/**", "fix/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-tests:
    name: Rust WASM Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: rust-wasm

      - name: Run route-calculator tests
        working-directory: rust-wasm/route-calculator
        run: cargo test --lib -- --nocapture --test-threads=1

  ts-tests:
    name: TypeScript Unit Tests & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build WASM artifacts for tests
        run: node scripts/build-wasm.ts

      - name: Type Audit
        run: pnpm tsc --noEmit

      - name: Run Vitest (Unit + Integration)
        run: pnpm test -- --reporter=verbose

  validate-routes:
    name: Validate Route Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Validate master_routes.json
        run: node --experimental-strip-types scripts/validate-routes.ts

  build-check:
    name: Build Check (Astro SSR)
    runs-on: ubuntu-latest
    needs: [ts-tests, validate-routes, rust-tests]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and Check WASM
        run: |
          node scripts/build-wasm.ts
          node scripts/check-wasm.cjs

      - name: Astro build (SSR Mode)
        run: pnpm run build
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
