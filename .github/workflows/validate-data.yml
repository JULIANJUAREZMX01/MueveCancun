name: Data Integrity Pipeline

on:
  push:
    paths: ["public/data/**", "scripts/*.ts"]
  pull_request:
    paths: ["public/data/**"]

jobs:
  validate:
    name: JSON Schema & Geodata Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node 22
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: 24
      - name: Run Script Audit
        run: |
          node --experimental-strip-types scripts/validate-routes.ts
          node -e "
            const data = JSON.parse(require('fs').readFileSync('public/data/master_routes.json', 'utf8'));
            const total = data.rutas.reduce((a, r) => a + r.paradas.length, 0);
            const missing = data.rutas.reduce((a, r) => a + r.paradas.filter(s => !s.lat).length, 0);
            console.log('Total Stops:', total);
            console.log('Missing Coords:', missing);
            if (missing / total > 0.3) { console.error('Data Quality Alert: >30% missing coords'); process.exit(1); }
          "
