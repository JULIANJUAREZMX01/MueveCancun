<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo redondeado caribe -->
  <rect width="64" height="64" rx="16" fill="url(#fav-bg)"/>
  <!-- Ola decorativa -->
  <path d="M8 44 Q16 36 24 40 Q32 44 40 38 Q48 32 56 38" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Bus body -->
  <rect x="14" y="22" width="36" height="20" rx="5" fill="white" opacity="0.95"/>
  <!-- Ventanas -->
  <rect x="17" y="26" width="9" height="7" rx="2" fill="url(#fav-bg)"/>
  <rect x="28" y="26" width="9" height="7" rx="2" fill="url(#fav-bg)"/>
  <rect x="39" y="26" width="8" height="7" rx="2" fill="url(#fav-bg)"/>
  <!-- Ruedas -->
  <circle cx="22" cy="43" r="4" fill="url(#fav-wheel)"/>
  <circle cx="22" cy="43" r="1.5" fill="white"/>
  <circle cx="42" cy="43" r="4" fill="url(#fav-wheel)"/>
  <circle cx="42" cy="43" r="1.5" fill="white"/>
  <!-- Parabrisas -->
  <rect x="14" y="34" width="36" height="2" rx="1" fill="rgba(255,255,255,0.25)"/>
  <defs>
    <linearGradient id="fav-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#004e5f"/>
      <stop offset="50%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="fav-wheel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>
</svg>
