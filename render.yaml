# Mueve Reparto — Render Blueprint
version: "1"

projects:
  - name: QUINTANAROO_CREATIONS
    environments:
      - name: MUEVE_REPARTO
        services:
          # --- Frontend Astro (static) ---
          - type: web
            name: mueve-reparto-web
            runtime: static
            repo: https://github.com/JULIANJUAREZMX01/MueveCancun
            envVars:
              - key: NODE_VERSION
                sync: false
              - key: ENABLE_PNPM
                sync: false
            buildCommand: bash scripts/setup-render.sh
            staticPublishPath: dist
            autoDeployTrigger: checksPass
            previews:
              generation: automatic
            routes:
              - type: rewrite
                source: /api/*
                destination: https://mueve-reparto-api.onrender.com/*

