# render.yaml — MueveCancún v3.5.0
# Sprint 2: Astro output:'server' + @astrojs/node (standalone)
# Render Web Service (Node.js) en lugar de Static Site.
#
# Env vars requeridas (Render Dashboard → Environment):
#   NODE_VERSION          → 22
#   ENABLE_PNPM           → 1
#   NODE_ENV              → production
#   STRIPE_SECRET_KEY     → sk_live_...
#   STRIPE_WEBHOOK_SECRET → whsec_RuI63mC55cDzXUr2PW4lrcHxY98ZXrRm
#   DATABASE_URL          → postgresql://...@ep-xxx.neon.tech/neondb?sslmode=require
#   PUBLIC_URL            → https://querutamellevacancun.onrender.com

version: "1"
projects:
- name: QUINTANAROO_CREATIONS
  environments:
  - name: CANCUNMUEVE
    services:
    - type: web
      name: QueRutaMeLLevaCancun
      # ⚠️  CAMBIO SPRINT 2: static → node (habilita API routes dinámicas)
      runtime: node
      repo: https://github.com/JULIANJUAREZMX01/MueveCancun
      envVars:
      - key: NODE_VERSION
        sync: false
      - key: ENABLE_PNPM
        sync: false
      - key: NODE_ENV
        value: production
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PUBLIC_URL
        value: https://querutamellevacancun.onrender.com
      buildCommand: bash scripts/setup-render.sh
      startCommand: node dist/server/entry.mjs
      healthCheckPath: /api/health
      headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /data/*
        name: Cache-Control
        value: public, max-age=3600, stale-while-revalidate=86400
      - path: /icons/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /wasm/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /vendor/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      previews:
        generation: automatic
