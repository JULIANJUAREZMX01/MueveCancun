# render.yaml — MueveCancún v4.0.0 (Nexus Agentic Core)
version: "1"
services:
  - type: web
    name: MueveCancun-App
    runtime: node
    repo: https://github.com/JULIANJUAREZMX01/MueveCancun
    buildCommand: bash scripts/setup-render.sh
    startCommand: pnpm start
    envVars:
      - key: NODE_VERSION
        value: "24.0.0"
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: SKIP_INSTALL_DEPS
        value: "true"

  - type: static_site
    name: MueveCancun-Static
    repo: https://github.com/JULIANJUAREZMX01/MueveCancun
    buildCommand: bash scripts/setup-render.sh
    publishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "24.0.0"
      - key: RENDER
        value: "true"
