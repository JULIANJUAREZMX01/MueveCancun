# render.yaml — MueveCancún v3.6.2
# Output: server (Astro SSR) — servido como Web Service (Node.js) en Render
# Soporta endpoints dinámicos, webhooks y persistencia Neon DB.

version: "1"
services:
- type: web
  name: QueRutaMeLLevaCancun
  runtime: node
  repo: https://github.com/JULIANJUAREZMX01/MueveCancun
  buildCommand: bash scripts/setup-render.sh
  startCommand: node dist/server/entry.mjs
  healthCheckPath: /api/health
  envVars:
  - key: NODE_VERSION
    value: 22
  - key: NODE_ENV
    value: production
  - key: PORT
    value: 10000
  - key: DATABASE_URL
    sync: false
  - key: STRIPE_SECRET_KEY
    sync: false
  - key: STRIPE_WEBHOOK_SECRET
    sync: false
  - key: PUBLIC_URL
    value: https://querutamellevacancun.onrender.com
  - key: DATABASE_PROVIDER
    value: neon
  headers:
  - path: /*
    name: X-Frame-Options
    value: DENY
  - path: /*
    name: X-Content-Type-Options
    value: nosniff
  - path: /*
    name: Referrer-Policy
    value: strict-origin-when-cross-origin
  - path: /*
    name: X-XSS-Protection
    value: 1; mode=block
  - path: /sw.js
    name: Cache-Control
    value: no-cache, no-store, must-revalidate
  - path: /data/*
    name: Cache-Control
    value: public, max-age=3600, stale-while-revalidate=86400
  - path: /wasm/*
    name: Cache-Control
    value: public, max-age=31536000, immutable
