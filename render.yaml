# render.yaml — MueveCancún v3.4.0
# Actualizado para soportar Astro output: 'hybrid' (SSG + SSR endpoints)
#
# CAMBIO vs v3.3: runtime static → node
#   • El 95% del sitio sigue siendo HTML estático (prerenderizado)
#   • /api/* rutas sirven como SSR (Stripe webhook, reports, checkout)
#
version: "1"
projects:
- name: QUINTANAROO_CREATIONS
  environments:
  - name: CANCUNMUEVE
    services:
    - type: web
      name: QueRutaMeLLevaCancun
      runtime: node
      repo: https://github.com/JULIANJUAREZMX01/MueveCancun
      envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ENABLE_PNPM
        value: "1"
      - key: NODE_ENV
        value: production
      # Secrets (set in Render Dashboard → Environment):
      # STRIPE_SECRET_KEY       → sk_live_...
      # STRIPE_WEBHOOK_SECRET   → whsec_...
      # GITHUB_ISSUES_TOKEN     → ghp_...
      # PUBLIC_URL              → https://querutamellevacancun.onrender.com
      # PUBLIC_GA4_ID           → G-XXXXXXXX
      buildCommand: bash scripts/setup-render.sh
      startCommand: node dist/server/entry.mjs
      autoDeployTrigger: checksPass
      healthCheckPath: /es/home
      previews:
        generation: automatic
