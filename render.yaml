# render.yaml — MueveCancún v4.0.0 (Nexus Agentic Core)
# output: 'server' (SSR) — se despliega como web service Node.js
# El sitio estático fue eliminado: output:server genera dist/server + dist/client
# y el web service sirve ambos correctamente.
version: "1"
services:
  - type: web
    name: MueveCancun-App
    runtime: node
    repo: https://github.com/JULIANJUAREZMX01/MueveCancun
    buildCommand: bash scripts/setup-render.sh
    startCommand: pnpm start
    envVars:
      - key: NODE_VERSION
        value: "22.21.0"
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: HOST
        value: "0.0.0.0"
      - key: ENABLE_COREPACK
        value: "1"
