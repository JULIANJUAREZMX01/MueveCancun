# render.yaml — MueveCancún v2.1.0 (Astro 6 / Node 24)
version: "1"
projects:
- name: QUINTANAROO_CREATIONS
  environments:
  - name: CANCUNMUEVE
    services:
    - type: web
      name: QueRutaMeLLevaCancun
      runtime: node
      repo: https://github.com/JULIANJUAREZMX01/MueveCancun
      buildCommand: pnpm build:vercel
      startCommand: pnpm start
      envVars:
      - key: NODE_VERSION
        value: "24.0.0"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: GITHUB_ISSUES_TOKEN
        sync: false
      - key: PUBLIC_URL
        value: https://querutamellevacancun.onrender.com
