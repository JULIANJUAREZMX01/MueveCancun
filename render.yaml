# render.yaml — MueveCancún v3.8.0 (Infrastructure Recovery Mode)
version: "1"
services:
  - type: web
    name: MueveCancun-App
    runtime: node
    repo: https://github.com/JULIANJUAREZMX01/MueveCancun
    buildCommand: bash scripts/setup-render.sh
    startCommand: pnpm start
    envVars:
      - key: NODE_VERSION
        value: "24.0.0"
      - key: NODE_ENV
        value: production

  - type: static_site
    name: MueveCancun-Static
    repo: https://github.com/JULIANJUAREZMX01/MueveCancun
    buildCommand: bash scripts/setup-render.sh
    publishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "24.0.0"
